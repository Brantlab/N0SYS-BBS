baseURL = "https://n0sys.net/"
languageCode = "en-us"
title = "NØSYS Packet Board"
theme = "n0sys-bbs"
enableRobotsTXT = true

[params]
  callsign = "N0SYS"
  displayCallsign = "NØSYS"
  frequency = "145.070 MHz"
  location = "EN70"
  operator = "SYSOP"
  tagline = "Amateur Radio Packet Bulletin Board"
  description = "A small corner of the airwaves for packet radio, homebrew, and local nets."
  accent = "amber"
  onlineSince = "1993"

[menu]
  [[menu.main]]
    name = "Messages"
    pageRef = "/posts"
    weight = 10
  [[menu.main]]
    name = "Station"
    pageRef = "/station"
    weight = 20
  [[menu.main]]
    identifier = "search"
    name = "Search"
    pageRef = "/search"
    weight = 30
    [menu.main.params]
      key = "F"

[markup.goldmark.renderer]
  unsafe = true

[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]

[caches]
  [caches.images]
    dir = ":cacheDir/images"
